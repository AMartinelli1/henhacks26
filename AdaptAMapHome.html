<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>AdaptaMap | An Accessible Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --red: #7d0000;
            --brown: #603813;
            --white: #faf9f6;
            --tan:  #f5e6cf;
            --gold: #c9a24d;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--tan);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
            position: relative;
        }

        .nav-left, .nav-right { display: flex; align-items: center; gap: 15px; }

        .logo { height: 100px; width: auto; }

        button, select {
            /* padding: 8px 16px; */
            cursor: pointer;
            border: 0px solid;
            background: var(--tan);
            font-weight: 500;
            font-size: 20px;
        }

        button:focus, select:focus { outline: var(--focus-ring); }

        /* Main Content Layout */
        main { display: flex; height: calc(100vh - 62px); }

        #sidebar {
            width: 25%;
            padding: 20px;
            background: var(--white);
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #map { flex-grow: 1; z-index: 1; }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: red;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 2000;
            border-radius: 8px;
            width: 300px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
        }

        .search-box input { width: 100%; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="nav-left">
        <button onclick="openModal('pinModal')" aria-label="Add a pin to the map">Add Pin</button>
        <button onclick="openModal('reportModal')" aria-label="Report an incident">Report Incident</button>
    </div>
        <img src="logo3.png" alt="Adaptamap Logo" class="logo" width="300px"/>
    </div>
    <div class="nav-right">
        <select id = "languageSelect" aria-label="Select Language">
            <option value='en'>English</option>
            <option value='zh'>中文</option>
            <option value='hi'>हिंदी</option>
            <option value='es'>Español</option>
            <option value='fr'>Français</option>
            <option value='ar'>عربي</option>
            <option value='bn'>বাংলা</option>
            <option value='pt'>Português</option>
            <option value='ru'>Русский</option>
            <option value='ja'>日本語</option>
        </select>
        <button onclick="window.location.href='/login.html'">Login</button>
    </div>
</header>

<main>
    <section id="sidebar" role="search">
        <div class="search-box">
            <label for="location-search"><strong>Search Location</strong></label>
            <input type="text" id="location-search" placeholder="Enter address or coordinates...">
        </div>
        <div class="filter-box">
            <strong>Filter Pins</strong><br>
            <input type="checkbox" id="incidents" checked> <label for="incidents">Incidents</label><br>
            <input type="checkbox" id="markers" checked> <label for="markers">Saved Places</label>
        </div>
    </section>

    <div id="map" aria-label="Interactive Map"></div>
</main>

<div class="overlay" id="overlay" onclick="closeModals()"></div>
<div id="pinModal" class="modal">
    <h3>Add a New Pin</h3>
    <p>Select location details...</p>
    <button onclick="closeModals()">Submit</button>
</div>
<div id="reportModal" class="modal">
    <h3>Report an Incident</h3>
    <textarea style="width:100%" rows="4"></textarea><br><br>
    <button onclick="closeModals()">Send Report</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize Map
    const map = L.map('map').setView([38.18857, -76.42610], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Modal Logic
    function openModal(id) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
    }

    function closeModals() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    document.getElementById("languageSelect").addEventListener("change", async function () {

        const selectedLanguage = this.value;

        // Collect text elements (skip language select options to preserve language names)
        const elements = Array.from(
            document.querySelectorAll("h1, h2, h3, h4, h5, h6, p, a, button, label, strong, span, li")
        ).filter(el => {
            if (el.closest("#languageSelect")) return false;
            return el.innerText.trim() !== "";
        });

        const texts = [];
        elements.forEach(el => {
            texts.push(el.innerText.trim());
        });

        try {
            const response = await fetch("/translate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    texts: texts,
                    targetLanguage: selectedLanguage
                })
            });

            const data = await response.json();

            // Replace text with translated text
            elements.forEach((el, index) => {
                if (data.translations[index]) {
                    el.innerText = data.translations[index];
                }
            });

        } catch (error) {
            console.error("Translation error:", error);
        }

    });

</script>

</body>
</html>
